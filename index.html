<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProductiveX OS — Career-Focused ML prep Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="logo">ProductiveX<span class="accent">OS</span></div>
      <ul>
        <li class="nav-item" data-route="#dashboard" onclick="Router.navigate('#dashboard')">
          Dashboard
        </li>
        <li class="nav-item" data-route="#planner" onclick="Router.navigate('#planner')">
          Daily Planner
        </li>
        <li class="nav-item" data-route="#habits" onclick="Router.navigate('#habits')">
          Habit Tracker
        </li>
        <li class="nav-item" data-route="#learning" onclick="Router.navigate('#learning')">
          Learning Tracker
        </li>
        <li class="nav-item" data-route="#projects" onclick="Router.navigate('#projects')">
          Project Tracker
        </li>
        <li class="nav-item" data-route="#codetantra" onclick="Router.navigate('#codetantra')">
          CodeTantra
        </li>
        <li class="nav-item" data-route="#review" onclick="Router.navigate('#review')">
          Weekly Review
        </li>
        <li class="nav-item" data-route="#analytics" onclick="Router.navigate('#analytics')">
          Analytics
        </li>
        <li class="nav-item" data-route="#mission" onclick="Router.navigate('#mission')">
          Mission Control
        </li>
      </ul>
      
      <!-- User profile in sidebar footer -->
      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar" id="user-avatar-initials">ML</div>
          <div class="user-info">
            <span class="user-name" id="user-display-name">ML Candidate</span>
            <span class="user-role">ML Engineer Prep</span>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div id="app">
        <!-- Content will be dynamically rendered here via Router -->
      </div>
    </main>
  </div>

  <!-- LOAD SCRIPTS IN ORDER -->
  <!-- 1. Data and configuration constants -->
  <script src="js/data.js"></script>
  <!-- 2. LocalStorage CRUD layer -->
  <script src="js/storage.js"></script>
  <!-- 3. SPA Router -->
  <script src="js/router.js"></script>
  <!-- 4. Logic & Calculation Engines -->
  <script src="js/engines/accountability.js"></script>
  <script src="js/engines/grading.js"></script>
  <script src="js/engines/mission.js"></script>
  <!-- 5. View Controllers for Router Hash Hooks -->
  <script src="js/dashboard.js"></script>
  <script src="js/daily-planner.js"></script>
  <script src="js/habit-tracker.js"></script>
  <script src="js/learning-tracker.js"></script>
  <script src="js/project-tracker.js"></script>
  <script src="js/codetantra.js"></script>
  <script src="js/weekly-review.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/mission-control.js"></script>
  
  <!-- 6. Main Application Entry Point -->
  <script src="js/main.js"></script>
</body>
</html>
